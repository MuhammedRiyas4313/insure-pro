<app-navbar [showLogin]="false"></app-navbar>

<div class="admin-layout">
  <app-admin-sidebar (logout)="showLogoutConfirm.set(true)"></app-admin-sidebar>
  
  <main class="admin-content">
    <header class="content-header">
      <h1>Our Policies</h1>
      <button class="btn btn-primary add-btn" (click)="openAddModal()">+ Add New Policy</button>
    </header>

    @if (loading()) {
      <div class="loader-container">
        <div class="shimmer-card"></div>
        <div class="shimmer-card"></div>
        <div class="shimmer-card"></div>
      </div>
    } @else {
      <section class="policies-grid">
        @for (policy of policies(); track policy._id) {
          <app-policy-card 
            [policy]="policy" 
            [isAdmin]="true"
            (onEdit)="openEditModal($event)"
            (onDelete)="confirmDelete($event)"
          ></app-policy-card>
        } @empty {
          <div class="empty-state-full card">
            <p>No policies available. Create one to get started.</p>
          </div>
        }
      </section>
    }
  </main>

  <!-- Policy Form Modal -->
  @if (showFormModal()) {
    <div class="modal-overlay">
      <div class="modal-content form-modal animate-fade-in">
        <header class="modal-header">
          <h2>{{ isEditing() ? 'Edit Policy' : 'Add New Policy' }}</h2>
        </header>
        
        <form (ngSubmit)="savePolicy()" #policyForm="ngForm">
          <div class="form-grid">
            <div class="form-group fieldset-group">
              <label>Policy Name</label>
              <input type="text" name="policyName" [ngModel]="currentPolicy().policyName" (ngModelChange)="currentPolicy().policyName = $event" required>
            </div>
            
            <!-- Reactive Inputs -->
            <div class="form-group fieldset-group">
              <label>Premium (₹ per year)</label>
              <input type="number" name="premium" [ngModel]="currentPolicy().premium" (ngModelChange)="onPremiumInput($event)" required>
            </div>
            <div class="form-group fieldset-group">
              <label>Coverage Amount (₹)</label>
              <input type="number" name="coverageAmount" [ngModel]="currentPolicy().coverageAmount" (ngModelChange)="onCoverageInput($event)" required>
            </div>
            <div class="form-group fieldset-group">
              <label>Duration (years)</label>
              <input type="text" name="duration" [ngModel]="currentPolicy().duration" (ngModelChange)="onDurationInput($event)" required placeholder="e.g. 2">
            </div>

            <div class="form-group fieldset-group full-width">
              <label>Eligibility</label>
              <textarea name="eligibility" [ngModel]="currentPolicy().eligibility" (ngModelChange)="currentPolicy().eligibility = $event" required></textarea>
            </div>
            <div class="form-group fieldset-group full-width">
              <label>Benefits (comma separated)</label>
              <textarea name="benefits" [ngModel]="benefitsInput()" (ngModelChange)="benefitsInput.set($event)" required placeholder="Benefit 1, Benefit 2"></textarea>
            </div>
          </div>
          
          <div class="modal-footer">
            <button type="submit" class="btn btn-blue-light" [disabled]="!policyForm.form.valid">
              {{ isEditing() ? 'Update' : 'Create' }}
            </button>
            <button type="button" class="btn btn-text-blue" (click)="closeFormModal()">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  }

  <!-- Delete Confirmation -->
  @if (showDeleteConfirm()) {
    <app-confirmation-dialog
      title="Delete Policy"
      [message]="'Are you sure you want to delete \'' + policyToDelete()?.policyName + '\'? This action cannot be undone.'"
      confirmLabel="Delete"
      (confirm)="onDeleteConfirmed()"
      (cancel)="showDeleteConfirm.set(false)"
    ></app-confirmation-dialog>
  }

  <!-- Logout Confirmation -->
  @if (showLogoutConfirm()) {
    <app-confirmation-dialog
      title="Logout"
      message="Are you sure you want to log out?"
      confirmLabel="Logout"
      (confirm)="onLogoutConfirmed()"
      (cancel)="showLogoutConfirm.set(false)"
    ></app-confirmation-dialog>
  }
</div>
